model:
  name: macro_regime
  universe:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
  params:
    btc_symbol: BTCUSDT
    classifier:
      trend_lookback: 63
      vol_lookback: 21
      vol_threshold: 0.80           # annualized vol threshold for high_vol regime
      trend_threshold: 0.0          # cumret threshold for risk_on vs risk_off
    allocations:
      risk_on:
        BTCUSDT: 0.40
        ETHUSDT: 0.35
        SOLUSDT: 0.25
      risk_off:
        BTCUSDT: 0.10
        ETHUSDT: 0.05
        SOLUSDT: 0.0
      high_vol:
        BTCUSDT: 0.05
        ETHUSDT: 0.02
        SOLUSDT: 0.0
  rebalance: weekly

app:
  mode: paper
  initial_equity: 100000.0
  timeframe: 1d

execution:
  fee_bps: 6
  slippage_bps: 2

risk:
  max_position_pct: 0.5
  max_daily_loss_pct: 0.05
  leverage_cap: 2
  default_sl_pct: 0.05
  default_tp_pct: 0.10
  kill_switch: false
  circuit_breaker_loss_pct: 0.10
