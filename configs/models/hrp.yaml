model:
  name: hrp
  universe:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - BNBUSDT
  params:
    lookback: 126
    min_history: 63
    max_weight: 0.5
    linkage_method: single
  rebalance: weekly

app:
  mode: paper
  initial_equity: 100000.0
  timeframe: 1d

execution:
  fee_bps: 6
  slippage_bps: 2

risk:
  max_position_pct: 0.5
  max_daily_loss_pct: 0.05
  leverage_cap: 1
  default_sl_pct: 0.05
  default_tp_pct: 0.10
  kill_switch: false
  circuit_breaker_loss_pct: 0.10
